[pytest]
# Configuration pytest

# Répertoires de test
testpaths = test

# Fichier de configuration
python_files = test_*.py conftest.py

# Pattern de test
python_classes = Test*
python_functions = test_*

# Options
addopts = 
    -v
    --strict-markers
    --tb=short
    -p no:warnings

# Markers personnalisés
markers =
    unit: Tests unitaires sans dépendances externes
    integration: Tests d'intégration avec FastAPI TestClient
    slow: Tests lents (mocking, I/O lourd)
    mock_llm: Tests qui mockent le client OpenAI

# Couverture de code (si pytest-cov est installé)
# addopts = --cov=app --cov-report=html --cov-report=term-missing
